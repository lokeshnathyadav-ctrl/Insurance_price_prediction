name: W2MLOps Pipeline

on:
  push:
    branches:
       - main # Automatically triggers on push to the main branch

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r W2MLOps/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python W2MLOps/model_buildin/data_register.py
  data-preparation:
    runs-on: ubuntu-latest
    needs: register-dataset
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r W2MLOps/requirements.txt
      - name: Run Data Preparation
        env:
	  HF_TOKEN: ${{ secrets.HF_TOKEN }}
	run: python W2MLOps/model_building/prep.py
  model-training:
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r W2MLOps/requirements.txt
      - name: Start MLflow Server
	run: |
	  nohup mlflow ui --host 0.0.0.0 --port 5000 & # Run MLflow UI in the background
          sleep 5 # Wait for a moment to let server starts
      - name: Model Building
	env:
	  HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python W2MLOps/model_building/train.py
  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs: [register-dataset, data-preparation, model-training]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r W2MLOps/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python W2MLOps/hosting.py
